<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | StartupSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="dark">

<nav class="navbar premium-nav">
  <div class="container">
    <a class="logo" href="index.html"><i class="fa-solid fa-rocket"></i> StartupSphere</a>
    <div class="nav-menu">
      <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
      <a href="ideas.html"><i class="fa-solid fa-lightbulb"></i> Ideas</a>
      <a href="forum.html"><i class="fa-solid fa-users"></i> Community</a>
      <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    </div>
    <div class="nav-actions">
      <a href="login.html" class="login-btn active">Login</a>
      <a href="signup.html" class="btn btn-primary">Get Started</a>
      <button onclick="toggleTheme()" class="btn btn-dark theme-toggle-btn">🌙</button>
    </div>
  </div>
</nav>

<div class="container section d-flex justify-content-center align-items-center" style="min-height:80vh;">
  <div class="glass-card" style="width:100%;max-width:440px;animation:fadeUp 0.6s ease both;">

    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:44px;margin-bottom:12px;">👋</div>
      <h2 style="font-size:24px;margin-bottom:6px;">Welcome Back</h2>
      <p class="muted">Sign in to your StartupSphere account.</p>
    </div>

    <!-- SOCIAL LOGIN -->
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px;">
      <button class="btn" style="background:var(--card);border:1px solid var(--border);color:var(--text);font-size:14px;padding:11px;display:flex;align-items:center;justify-content:center;gap:10px;">
        <img src="https://www.google.com/favicon.ico" width="16" height="16" alt="Google"> Continue with Google
      </button>
      <button class="btn" style="background:var(--card);border:1px solid var(--border);color:var(--text);font-size:14px;padding:11px;display:flex;align-items:center;justify-content:center;gap:10px;">
        <span>🐱</span> Continue with GitHub
      </button>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
      <div style="flex:1;height:1px;background:var(--border);"></div>
      <span style="font-size:12px;color:var(--text3);">or sign in with email</span>
      <div style="flex:1;height:1px;background:var(--border);"></div>
    </div>

    <form id="login-form">
      <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="mb-3">
        <label style="display:flex;justify-content:space-between;align-items:center;">
          Password
          <a href="#" style="font-size:12px;color:var(--accent2);">Forgot password?</a>
        </label>
        <div style="position:relative;">
          <input type="password" class="form-control" id="password-input" placeholder="Enter your password" required>
          <button type="button" onclick="togglePassword()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;">👁</button>
        </div>
      </div>
      <div class="mb-3" style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="remember" style="accent-color:var(--accent);">
        <label for="remember" style="margin:0;font-size:13px;color:var(--text2);cursor:pointer;">Remember me for 30 days</label>
      </div>
      <button type="button" class="btn btn-primary w-100" style="padding:12px;font-size:15px;" onclick="doLogin(this)">
        Sign In
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--text3);">
      Don't have an account? <a href="signup.html" style="color:var(--accent2);">Sign up free</a>
    </p>

  </div>
</div>

<footer><p>© 2026 StartupSphere. Built for innovators 🚀</p></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script>
  function togglePassword() {
    const input = document.getElementById('password-input');
    input.type = input.type === 'password' ? 'text' : 'password';
  }
  function doLogin(btn) {
    const inputs = document.querySelectorAll('#login-form input[required]');
    let valid = true;
    inputs.forEach(input => {
      if (!input.value.trim()) {
        input.style.borderColor = '#ef4444';
        valid = false;
        setTimeout(() => { input.style.borderColor=''; }, 2000);
      }
    });
    if (!valid) return;
    btn.textContent = '✅ Signing In...';
    btn.disabled = true;
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
  }
</script>
</body>
</html>
