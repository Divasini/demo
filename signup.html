<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | StartupSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="dark">

<nav class="navbar premium-nav">
  <div class="container">
    <a class="logo" href="index.html"><i class="fa-solid fa-rocket"></i> StartupSphere</a>
    <div class="nav-menu">
      <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
      <a href="ideas.html"><i class="fa-solid fa-lightbulb"></i> Ideas</a>
      <a href="forum.html"><i class="fa-solid fa-users"></i> Community</a>
      <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    </div>
    <div class="nav-actions">
      <a href="login.html" class="login-btn">Login</a>
      <a href="signup.html" class="btn btn-primary">Get Started</a>
      <button onclick="toggleTheme()" class="btn btn-dark theme-toggle-btn">🌙</button>
    </div>
  </div>
</nav>

<div class="container section d-flex justify-content-center align-items-center" style="min-height:80vh;">
  <div class="glass-card" style="width:100%;max-width:460px;animation:fadeUp 0.6s ease both;">

    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:44px;margin-bottom:12px;">🚀</div>
      <h2 style="font-size:24px;margin-bottom:6px;">Create Account</h2>
      <p class="muted">Join 15,000+ innovators on StartupSphere.</p>
    </div>

    <!-- SOCIAL SIGNUP -->
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px;">
      <button class="btn" style="background:var(--card);border:1px solid var(--border);color:var(--text);font-size:14px;padding:11px;display:flex;align-items:center;justify-content:center;gap:10px;">
        <img src="https://www.google.com/favicon.ico" width="16" height="16" alt="Google"> Sign up with Google
      </button>
      <button class="btn" style="background:var(--card);border:1px solid var(--border);color:var(--text);font-size:14px;padding:11px;display:flex;align-items:center;justify-content:center;gap:10px;">
        <span>🐱</span> Sign up with GitHub
      </button>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
      <div style="flex:1;height:1px;background:var(--border);"></div>
      <span style="font-size:12px;color:var(--text3);">or register with email</span>
      <div style="flex:1;height:1px;background:var(--border);"></div>
    </div>

    <form id="signup-form">
      <div class="mb-3">
        <label>Full Name *</label>
        <input type="text" class="form-control" placeholder="Arjun Kumar" required>
      </div>
      <div class="mb-3">
        <label>Email *</label>
        <input type="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="mb-3">
        <label>Password *</label>
        <div style="position:relative;">
          <input type="password" class="form-control" id="pw1" placeholder="Min. 8 characters" required>
          <button type="button" onclick="document.getElementById('pw1').type==='password'?document.getElementById('pw1').type='text':document.getElementById('pw1').type='password'" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;">👁</button>
        </div>
        <!-- Password strength bar -->
        <div style="height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;">
          <div id="strength-bar" style="height:100%;width:0%;background:var(--accent-grad);border-radius:2px;transition:width 0.3s;"></div>
        </div>
        <div id="strength-text" style="font-size:11px;color:var(--text3);margin-top:4px;"></div>
      </div>
      <div class="mb-3">
        <label>Confirm Password *</label>
        <input type="password" class="form-control" id="pw2" placeholder="Re-enter password" required>
      </div>
      <div class="mb-3" style="display:flex;align-items:flex-start;gap:8px;">
        <input type="checkbox" id="terms" style="accent-color:var(--accent);margin-top:2px;" required>
        <label for="terms" style="margin:0;font-size:13px;color:var(--text2);cursor:pointer;line-height:1.5;">
          I agree to the <a href="#" style="color:var(--accent2);">Terms of Service</a> and <a href="#" style="color:var(--accent2);">Privacy Policy</a>
        </label>
      </div>
      <button type="button" class="btn btn-primary w-100" style="padding:12px;font-size:15px;" onclick="doSignup(this)">
        Create Account 🚀
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--text3);">
      Already have an account? <a href="login.html" style="color:var(--accent2);">Sign in</a>
    </p>

  </div>
</div>

<footer><p>© 2026 StartupSphere. Built for innovators 🚀</p></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script>
  // Password strength
  document.getElementById('pw1').addEventListener('input', function() {
    const val = this.value;
    const bar = document.getElementById('strength-bar');
    const txt = document.getElementById('strength-text');
    let strength = 0;
    if (val.length >= 8) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;
    const colors = ['#ef4444','#f59e0b','#10b981','#6366f1'];
    const labels = ['Weak','Fair','Good','Strong'];
    bar.style.width = (strength * 25) + '%';
    bar.style.background = colors[strength-1] || 'var(--border)';
    txt.textContent = val.length > 0 ? labels[strength-1] || '' : '';
    txt.style.color = colors[strength-1] || 'var(--text3)';
  });

  function doSignup(btn) {
    const inputs = document.querySelectorAll('#signup-form input[required]');
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    let valid = true;
    inputs.forEach(input => {
      if (!input.value.trim()) {
        input.style.borderColor = '#ef4444';
        valid = false;
        setTimeout(() => { input.style.borderColor=''; }, 2000);
      }
    });
    if (pw1 !== pw2) {
      document.getElementById('pw2').style.borderColor = '#ef4444';
      valid = false;
    }
    if (!valid) return;
    btn.textContent = '✅ Creating Account...';
    btn.disabled = true;
    setTimeout(() => { window.location.href = 'profile.html'; }, 1400);
  }
</script>
</body>
</html>
